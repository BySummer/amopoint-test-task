services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: amopoint-laravel-test-app
    working_dir: /var/www
    volumes:
      - ./laravel:/var/www
    depends_on:
      - postgres

  nginx:
    image: nginx:stable-alpine
    container_name: amopoint-laravel-test-nginx
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./laravel:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: amopoint-laravel-test-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: